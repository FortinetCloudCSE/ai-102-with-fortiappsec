// ============================================================================

let jsonRpcIdCounter = 0;
const resetJsonRpcId = () => { jsonRpcIdCounter = 0; };

const jsonRpcRequest = (method, params, id) => ({
  jsonrpc: '2.0',
  method,
  params,
  id: id ?? ++jsonRpcIdCounter,
});

const jsonRpcResponse = (result, id) => ({
  jsonrpc: '2.0',
  result,
  id,
});

const jsonRpcNotification = (method, params) => ({
  jsonrpc: '2.0',
  method,
  ...(params ? { params } : {}),
});

  const [isPlaying, setIsPlaying] = useState(false);
  const [playSpeed, setPlaySpeed] = useState(2000); // ms per step
  const [conversationHistory, setConversationHistory] = useState([]);
  const [messageLog, setMessageLog] = useState([]);
  const [componentStates, setComponentStates] = useState({ ...INITIAL_STATE });

  const intervalRef = useRef(null);

  // Derived values
  const currentStep = STEPS[currentStepIndex] || STEPS[0];
  const actSteps = STEPS.filter(s => s.act === currentAct);
  const actStepIndex = currentStepIndex - (ACT_OFFSETS[currentAct] ?? 0);
  const totalSteps = STEPS.length;
  const totalActSteps = ACT_LENGTHS[currentAct] ?? 0;

  // Active components and message flow from current step
  const activeComponents = currentStep.activeComponents || [];
  const messageFlow = currentStep.messageFlow || null;

  // Build the full tool registry (when complete)
  const toolRegistry = componentStates.toolRegistryComplete
    ? API_TOOL_DEFINITIONS
    : componentStates.registeredTools
      ? API_TOOL_DEFINITIONS.filter(t => componentStates.registeredTools.includes(t.name))
      : [];

  // Apply state mutations for a given step index, building cumulatively from start
  const computeStateAtStep = useCallback((targetIndex) => {
    const state = { ...INITIAL_STATE };
    for (let i = 0; i <= targetIndex; i++) {
      const step = STEPS[i];
      if (step && step.stateMutations) {
        Object.assign(state, step.stateMutations);
      }
    }
    return state;
  }, []);

  // Compute conversation history up to a given step index
  const computeConversationAtStep = useCallback((targetIndex) => {
    const history = [];
    for (let i = 0; i <= targetIndex; i++) {
      const step = STEPS[i];
      if (step && step.chatUpdate) {
        history.push({ ...step.chatUpdate, stepId: step.id });
      }
    }
    return history;
  }, []);

  // Compute message log up to a given step index
  const computeMessageLogAtStep = useCallback((targetIndex) => {
    const log = [];
    for (let i = 0; i <= targetIndex; i++) {
      const step = STEPS[i];
      if (step && step.message && step.messageFlow) {
        log.push({
          stepId: step.id,
          act: step.act,
          phase: step.phase,
          label: step.label,
          flow: step.messageFlow,
          payload: step.message,
          timestamp: i,
        });
      }
    }
    return log;
  }, []);

  // Navigate to a specific step index
  const goToStep = useCallback((index) => {
    const clamped = Math.max(0, Math.min(index, STEPS.length - 1));
    const step = STEPS[clamped];
    setCurrentStepIndex(clamped);
    setCurrentAct(step.act);
    setComponentStates(computeStateAtStep(clamped));
    setConversationHistory(computeConversationAtStep(clamped));
    setMessageLog(computeMessageLogAtStep(clamped));
  }, [computeStateAtStep, computeConversationAtStep, computeMessageLogAtStep]);

  // Next / Previous
  const next = useCallback(() => {
    if (currentStepIndex < STEPS.length - 1) {
      goToStep(currentStepIndex + 1);
    } else {
      setIsPlaying(false);
    }
  }, [currentStepIndex, goToStep]);

  const prev = useCallback(() => {
    if (currentStepIndex > 0) {
      goToStep(currentStepIndex - 1);
    }
  }, [currentStepIndex, goToStep]);

  // Go to act
  const goToAct = useCallback((act) => {
    const offset = ACT_OFFSETS[act];
    if (offset !== undefined) {
      goToStep(offset);
    }
  }, [goToStep]);

  // Play / Pause
  const play = useCallback(() => {
    setIsPlaying(true);
  }, []);

  const pause = useCallback(() => {
    setIsPlaying(false);
  }, []);

  const togglePlay = useCallback(() => {
    setIsPlaying(prev => !prev);
  }, []);

  // Reset to beginning
  const reset = useCallback(() => {
    setIsPlaying(false);
    goToStep(0);
  }, [goToStep]);

  // Auto-play timer
  useEffect(() => {
    if (isPlaying) {
      intervalRef.current = setInterval(() => {
        setCurrentStepIndex(prev => {
          const nextIdx = prev + 1;
          if (nextIdx >= STEPS.length) {
            setIsPlaying(false);
            return prev;
          }
          const step = STEPS[nextIdx];
          setCurrentAct(step.act);
          setComponentStates(computeStateAtStep(nextIdx));
          setConversationHistory(computeConversationAtStep(nextIdx));
          setMessageLog(computeMessageLogAtStep(nextIdx));
          return nextIdx;
        });
      }, playSpeed);
    }

    return () => {
      if (intervalRef.current) {
        clearInterval(intervalRef.current);
        intervalRef.current = null;
      }
    };
  }, [isPlaying, playSpeed, computeStateAtStep, computeConversationAtStep, computeMessageLogAtStep]);

  return {
    // Current state
    state: componentStates,
    currentStep,
    currentStepIndex,
    currentAct,
    actStepIndex,
    totalActSteps,

    // Step data
    steps: STEPS,
    actSteps,
    totalSteps,

    // Navigation
    next,
    prev,
    play,
    pause,
    togglePlay,
    goToAct,
    goToStep,
    reset,

    // Playback
    isPlaying,
    playSpeed,
    setPlaySpeed,

    // Data
    config: MCP_CONFIG,
    toolRegistry,
    toolOwnership: TOOL_OWNERSHIP,
    conversationHistory,
    messageLog,

    // Diagram inputs
    activeComponents,
    messageFlow,
    componentStates,

    // Server definitions
    serverDefinitions: SERVER_DEFINITIONS,
    apiToolDefinitions: API_TOOL_DEFINITIONS,

    // Act metadata
    actMetadata: ACT_METADATA,
    actOffsets: ACT_OFFSETS,
    actLengths: ACT_LENGTHS,

    // Simulated data
    simulatedFS: SIMULATED_FS,
  };
}

/** Determine if a component has appeared during boot sequence */
function isVisible(id, cs) {
  if (!cs.systemPhase || (cs.systemPhase !== 'pre-boot' && cs.systemPhase !== 'booting')) {
    return true; // After boot, everything visible
  }
  if (cs.systemPhase === 'pre-boot') return false;
  // During boot — derive from component states
  switch (id) {
    case C.HOST:         return true;
    case C.MODEL:        return cs.toolRegistryComplete;
    case C.CLIENT_1:     return cs.client1State !== 'none';
    case C.CLIENT_2:     return cs.client2State !== 'none';
    case C.SERVER_FILES: return cs.server1State !== 'disconnected';
    case C.SERVER_UTILS: return cs.server2State !== 'disconnected';
    case C.API:          return cs.toolRegistryComplete;
    default:             return false;
  }
}

/** Format a state value for display (e.g. "building_request" → "building request") */
function fmtState(raw) {
  if (!raw || raw === 'none' || raw === 'idle' || raw === 'pre-boot') return null;
  return raw.replace(/_/g, ' ');
}

/** Get animation duration based on path length */
function getFlowDur(from, to) {
  const key = `${from}->${to}`;
  if (key.startsWith('server') && key.endsWith('host')) return '1.2s';
  if (key.includes('anthropic')) return '0.7s';
  if (key.includes('->client')) return '0.5s';
  return '0.8s';
}

/** Renders a single component box (rect + labels + state badge) */
function CompBox({ id, active, opacity, stateText, isHost, isServer }) {
  const r = COMP_RECTS[id];
  const m = COMP_META[id];
  if (!r || !m) return null;
  const color = COLORS[m.ck];

  // Host gets special semi-transparent treatment
  const fillOpacity = isHost ? 0.12 : 0.3;
  const strokeW = active ? 2.5 : 1.5;
  const filter = active ? `url(#glow-${m.ck})` : 'none';

  const cx = r.x + r.w / 2;
  // Server boxes: left-align labels to make room for tools on the right
  const labelX = isServer ? r.x + 18 : cx;
  const labelAnchor = isServer ? 'start' : 'middle';
  const labelY = isHost ? r.y + 16 : r.y + r.h / 2 - 6;
  const subY = isHost ? r.y + 30 : r.y + r.h / 2 + 10;

  return (
    <g style={{ opacity, transition: 'opacity 0.3s ease' }}>
      <rect
        x={r.x} y={r.y} width={r.w} height={r.h} rx={r.rx}
        fill={color.bg} fillOpacity={fillOpacity}
        stroke={color.border} strokeWidth={strokeW}
        filter={filter}
        style={{ transition: 'stroke-width 0.3s ease, filter 0.3s ease' }}
      />
      <text
        x={labelX} y={labelY}
        textAnchor={labelAnchor} fill={color.text}
        fontSize={isHost ? 14 : 13} fontWeight="600"
        fontFamily="system-ui, -apple-system, sans-serif"
      >
        {m.label}
      </text>
      <text
        x={labelX} y={subY}
        textAnchor={labelAnchor} fill={color.text}
        fontSize={isHost ? 11 : 10} fontFamily="'Courier New', monospace"
        opacity={0.7}
      >
        {m.sub}
      </text>
      {/* State badge */}
      {stateText && (
        <g>
          <rect
            x={cx - stateText.length * 3.5 - 8}
            y={isHost ? r.y + r.h - 24 : r.y + r.h - 20}
            width={stateText.length * 7 + 16}
            height={17} rx={8.5}
            fill={color.bg} fillOpacity={0.9}
            stroke={color.border} strokeWidth={0.8}
          />
          <text
            x={cx}
            y={isHost ? r.y + r.h - 12 : r.y + r.h - 8}
            textAnchor="middle" fill={color.text}
            fontSize={9} fontFamily="'Courier New', monospace"
          >
            {stateText}
          </text>
        </g>
      )}
    </g>
  );
}

/** Renders tool name badges on a server component (right side) */
function ToolBadges({ serverId, tools }) {
  const r = COMP_RECTS[serverId];
  if (!r || !tools || tools.length === 0) return null;
  const color = COLORS.server;
  const dividerX = r.x + r.w * 0.45;
  const toolX = dividerX + 14;
  // Vertically center the tool list within the box
  const totalHeight = (tools.length - 1) * 15;
  const startY = r.y + r.h / 2 - totalHeight / 2 + 3;

  return (
    <g style={{ transition: 'opacity 0.5s ease' }}>
      {/* Vertical divider */}
      <line
        x1={dividerX} y1={r.y + 15}
        x2={dividerX} y2={r.y + r.h - 15}
        stroke={color.border} strokeWidth={0.5} opacity={0.3}
      />
      {tools.map((tool, i) => (
        <text
          key={tool}
          x={toolX} y={startY + i * 15}
          textAnchor="start" fill={color.text}
          fontSize={9} fontFamily="'Courier New', monospace"
          opacity={0.65}
        >
          {typeof tool === 'string' ? tool : tool.name}
        </text>
      ))}
    </g>
  );
}

/** Renders the animated message flow packet */
function FlowPacket({ messageFlow, flowId }) {
  if (!messageFlow) return null;
  const path = FLOW_PATHS[`${messageFlow.from}->${messageFlow.to}`];
  if (!path) return null;

  const color = FLOW_COLORS[messageFlow.type] || '#6b7280';
  const dur = getFlowDur(messageFlow.from, messageFlow.to);
  const label = messageFlow.label || '';

  return (
    <g key={`packet-${flowId}`}>
      {/* Outer glow */}
      <circle cx="0" cy="0" r="10" fill={color} opacity={0.25} filter="url(#glow-packet)">
        <animateMotion dur={dur} path={path} fill="freeze" repeatCount="1" calcMode="linear" />
      </circle>
      {/* Core dot */}
      <circle cx="0" cy="0" r="5" fill={color}>
        <animateMotion dur={dur} path={path} fill="freeze" repeatCount="1" calcMode="linear" />
      </circle>
      {/* Bright center */}
      <circle cx="0" cy="0" r="2" fill="#fff" opacity={0.8}>
        <animateMotion dur={dur} path={path} fill="freeze" repeatCount="1" calcMode="linear" />
      </circle>
      {/* Label */}
      {label && (
        <text
          x="0" y="-14"
          textAnchor="middle" fill={color}
          fontSize={9} fontWeight="bold"
          fontFamily="'Courier New', monospace"
        >
          <animateMotion dur={dur} path={path} fill="freeze" repeatCount="1" calcMode="linear" />
          {label}
        </text>
      )}
    </g>
  );
}

function ArchitectureDiagram({
  activeComponents = [],
  messageFlow = null,
  componentStates = {},
  phase = '',
  bootProgress = 0,
  serverTools = {},
}) {
  const activeSet = useMemo(() => new Set(activeComponents), [activeComponents]);

  // Track flow changes for unique animation keys
  const flowIdRef = useRef(0);
  const prevFlowRef = useRef('');
  const flowSig = messageFlow ? `${messageFlow.from}|${messageFlow.to}|${messageFlow.label}` : '';
  if (flowSig !== prevFlowRef.current) {
    flowIdRef.current++;
    prevFlowRef.current = flowSig;
  }

  // Compute visibility for each component
  const vis = useMemo(() => {
    const v = {};
    Object.keys(COMP_RECTS).forEach(id => {
      v[id] = isVisible(id, componentStates);
    });
    return v;
  }, [componentStates]);

  // Compute opacity: active=1, visible-but-inactive=0.4, not-visible=0.08
  const getOpacity = (id) => {
    if (!vis[id]) return 0.08;
    if (activeSet.has(id)) return 1;
    return 0.4;
  };

  // Get state text for a component
  const getState = (id) => {
    const key = STATE_KEYS[id];
    return key ? fmtState(componentStates[key]) : null;
  };

  // Determine which tools to show on each server
  const fileTools = useMemo(() => {
    if (serverTools?.['server-files']) return serverTools['server-files'];
    const reg = componentStates.registeredTools || [];
    return SERVER_TOOL_NAMES[C.SERVER_FILES].filter(t => reg.includes(t));
  }, [serverTools, componentStates.registeredTools]);

  const utilTools = useMemo(() => {
    if (serverTools?.['server-utils']) return serverTools['server-utils'];
    const reg = componentStates.registeredTools || [];
    return SERVER_TOOL_NAMES[C.SERVER_UTILS].filter(t => reg.includes(t));
  }, [serverTools, componentStates.registeredTools]);

  // Connection line opacity
  const connOpacity = (c1, c2) => {
    if (activeSet.has(c1) && activeSet.has(c2)) return 0.8;
    if (vis[c1] && vis[c2]) return 0.3;
    return 0.06;
  };

  // Transport visibility
  const transportVis = vis[C.CLIENT_1] || vis[C.CLIENT_2] ||
                       vis[C.SERVER_FILES] || vis[C.SERVER_UTILS];

  // Component ordering: host first (bottom), then internals, then externals
  const innerIds = [C.MODEL, C.CLIENT_1, C.CLIENT_2];
  const outerIds = [C.API, C.SERVER_FILES, C.SERVER_UTILS];

  return (
    <div style={{
      width: '100%',
      background: '#1a1a2e',
      borderRadius: 12,
      overflow: 'hidden',
      border: '1px solid rgba(255,255,255,0.06)',
    }}>
      <svg
        viewBox="0 10 1155 441"
        style={{ width: '100%', height: 'auto', display: 'block' }}
        xmlns="http://www.w3.org/2000/svg"
      >
        {/* ============================================================ */}
        {/* DEFS: Filters, markers, styles                               */}
        {/* ============================================================ */}
        <defs>
          {/* Glow filters for each color category */}
          {Object.entries(COLORS).filter(([k]) => k !== 'transport').map(([key, col]) => (
            <filter key={`glow-${key}`} id={`glow-${key}`} x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur" />
              <feFlood floodColor={col.border} floodOpacity="0.5" result="color" />
              <feComposite in="color" in2="blur" operator="in" result="shadow" />
              <feMerge>
                <feMergeNode in="shadow" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          ))}

          {/* Packet glow */}
          <filter id="glow-packet" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>

          {/* Arrow markers */}
          <marker id="arrow-dim" viewBox="0 0 10 8" refX="9" refY="4"
            markerWidth="6" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 4 L 0 8 z" fill="#6b7280" opacity="0.5" />
          </marker>
          <marker id="arrow-api" viewBox="0 0 10 8" refX="9" refY="4"
            markerWidth="6" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 4 L 0 8 z" fill={COLORS.api.border} opacity="0.7" />
          </marker>
        </defs>

        {/* ============================================================ */}
        {/* BACKGROUND                                                   */}
        {/* ============================================================ */}
        <rect x="0" y="10" width="1155" height="441" fill="#1a1a2e" />

        {/* Subtle dot grid */}
        <g opacity="0.08">
          {Array.from({ length: 28 }, (_, i) =>
            Array.from({ length: 11 }, (_, j) => (
              <circle
                key={`dot-${i}-${j}`}

const MONO_FONT = "'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace";

const SYNTAX = {
  key:     '#60a5fa',
  string:  '#34d399',
  number:  '#fbbf24',
  boolean: '#f472b6',
  null:    '#9ca3af',
  brace:   '#d1d5db',
  colon:   '#9ca3af',
  comma:   '#6b7280',
};

const PANEL_BG = '#0f0f1e';
const PANEL_BORDER = '#2a2a4a';
const HIGHLIGHT_BG = 'rgba(96, 165, 250, 0.08)';
const CURRENT_BG = 'rgba(96, 165, 250, 0.15)';

// Map message flow types to display info
function getMessageDisplayInfo(logEntry) {
  if (!logEntry || !logEntry.flow) return { arrow: '→', color: '#9ca3af', label: 'Message', summary: '' };

  const { flow, phase, label } = logEntry;
  const type = flow.type;

  if (type === 'api_request') {
    return { arrow: '→', color: COLORS.api.text, label: label || 'API Request', summary: 'Host → Anthropic API' };
  }
  if (type === 'api_response') {
    return { arrow: '←', color: COLORS.api.text, label: label || 'API Response', summary: 'Anthropic API → Host' };
  }
  if (type === 'jsonrpc_request') {
    return { arrow: '→', color: COLORS.client.text, label: flow.label || 'JSON-RPC Request', summary: `${flow.from} → ${flow.to}` };
  }
  if (type === 'jsonrpc_response') {
    return { arrow: '←', color: COLORS.server.text, label: flow.label || 'JSON-RPC Response', summary: `${flow.from} → ${flow.to}` };
  }
  if (type === 'transport') {
    return { arrow: '→', color: COLORS.transport.text, label: flow.label || 'Transport', summary: 'Connection' };
  }
  if (type === 'internal') {
    return { arrow: '→', color: '#c084fc', label: flow.label || 'Internal', summary: `${flow.from} → ${flow.to}` };
  }
  return { arrow: '→', color: '#9ca3af', label: label || 'Message', summary: '' };
}

// ============================================================================
// JSON SYNTAX HIGHLIGHTER WITH COLLAPSIBLE NODES
// ============================================================================

function JsonNode({ keyName, value, depth, annotations, lineCounter, isNewInDiff }) {
  const [collapsed, setCollapsed] = useState(depth > 2);
  const indent = depth * 16;

  const lineNum = useRef(lineCounter.current);
  useEffect(() => { lineNum.current = lineCounter.current; }, [lineCounter.current]);

  // Determine annotation for this key
  const annotation = annotations ? annotations[keyName] : null;

  // Render line number
  const LineNum = ({ num }) => (
    <span style={{ color: '#4a4a6a', marginRight: 8, minWidth: 28, display: 'inline-block', textAlign: 'right', fontSize: 11, userSelect: 'none' }}>
      {num}
    </span>
  );

  const currentLine = ++lineCounter.current;

  if (value === null) {
    return (
      <div style={{ paddingLeft: indent, display: 'flex', alignItems: 'center', minHeight: 20 }}>
        <LineNum num={currentLine} />
        {keyName !== undefined && (
          <><span style={{ color: SYNTAX.key }}>"{keyName}"</span><span style={{ color: SYNTAX.colon }}>: </span></>
        )}
        <span style={{ color: SYNTAX.null }}>null</span>
      </div>
    );
  }

  if (typeof value === 'boolean') {
    return (
      <div style={{ paddingLeft: indent, display: 'flex', alignItems: 'center', minHeight: 20 }}>
        <LineNum num={currentLine} />
        {keyName !== undefined && (
          <><span style={{ color: SYNTAX.key }}>"{keyName}"</span><span style={{ color: SYNTAX.colon }}>: </span></>
        )}
        <span style={{ color: SYNTAX.boolean }}>{value.toString()}</span>
      </div>
    );
  }

  if (typeof value === 'number') {
    return (
      <div style={{ paddingLeft: indent, display: 'flex', alignItems: 'center', minHeight: 20 }}>
        <LineNum num={currentLine} />
        {keyName !== undefined && (
          <><span style={{ color: SYNTAX.key }}>"{keyName}"</span><span style={{ color: SYNTAX.colon }}>: </span></>
        )}
        <span style={{ color: SYNTAX.number }}>{value}</span>
      </div>
    );
  }

  if (typeof value === 'string') {
    const displayVal = value.length > 120 ? value.slice(0, 117) + '...' : value;
    return (
      <div style={{ paddingLeft: indent, display: 'flex', alignItems: 'flex-start', minHeight: 20 }}>
        <LineNum num={currentLine} />
        {keyName !== undefined && (
          <><span style={{ color: SYNTAX.key }}>"{keyName}"</span><span style={{ color: SYNTAX.colon }}>: </span></>
        )}
        <span style={{ color: SYNTAX.string }}>"{displayVal}"</span>
      </div>
    );
  }

  if (Array.isArray(value)) {
    if (value.length === 0) {
      return (
        <div style={{ paddingLeft: indent, display: 'flex', alignItems: 'center', minHeight: 20 }}>
          <LineNum num={currentLine} />
          {keyName !== undefined && (
            <><span style={{ color: SYNTAX.key }}>"{keyName}"</span><span style={{ color: SYNTAX.colon }}>: </span></>
          )}
          <span style={{ color: SYNTAX.brace }}>[]</span>
        </div>
      );
    }

    const annotationBorder = annotation ? annotation.borderColor : null;
    const annotationLabel = annotation ? annotation.label : null;

    return (
      <div style={{
        borderLeft: annotationBorder ? `2px solid ${annotationBorder}` : undefined,
        marginLeft: annotationBorder ? -2 : undefined,
      }}>
        <div
          style={{ paddingLeft: indent, display: 'flex', alignItems: 'center', minHeight: 20, cursor: 'pointer' }}
          onClick={() => setCollapsed(!collapsed)}
        >
          <LineNum num={currentLine} />
          <span style={{ color: '#6b7280', marginRight: 4, fontSize: 10, width: 12, textAlign: 'center' }}>
            {collapsed ? '▶' : '▼'}
          </span>
          {keyName !== undefined && (
            <><span style={{ color: SYNTAX.key }}>"{keyName}"</span><span style={{ color: SYNTAX.colon }}>: </span></>
          )}
          <span style={{ color: SYNTAX.brace }}>[</span>
          {collapsed && <span style={{ color: '#6b7280' }}> {value.length} items </span>}
          {collapsed && <span style={{ color: SYNTAX.brace }}>]</span>}
          {annotationLabel && (
            <span style={{
              marginLeft: 8, fontSize: 10, color: annotationBorder || '#9ca3af',
              background: `${annotationBorder || '#9ca3af'}15`, padding: '1px 6px', borderRadius: 3,
            }}>
              {annotationLabel}
            </span>
          )}
        </div>
        {!collapsed && (
          <>
            {value.map((item, i) => (
              <JsonNode
                key={i}
                value={item}
                depth={depth + 1}
                annotations={annotations}
                lineCounter={lineCounter}
                isNewInDiff={false}
              />
            ))}
            <div style={{ paddingLeft: indent, display: 'flex', alignItems: 'center', minHeight: 20 }}>
              <LineNum num={++lineCounter.current} />
              <span style={{ color: SYNTAX.brace }}>]</span>
            </div>
          </>
        )}
      </div>
    );
  }

  if (typeof value === 'object') {
    const keys = Object.keys(value);
    if (keys.length === 0) {
      return (
        <div style={{ paddingLeft: indent, display: 'flex', alignItems: 'center', minHeight: 20 }}>
          <LineNum num={currentLine} />
          {keyName !== undefined && (
            <><span style={{ color: SYNTAX.key }}>"{keyName}"</span><span style={{ color: SYNTAX.colon }}>: </span></>
          )}
          <span style={{ color: SYNTAX.brace }}>{'{}'}</span>
        </div>
      );
    }

    const annotationBorder = annotation ? annotation.borderColor : null;
    const annotationLabel = annotation ? annotation.label : null;

    return (
      <div style={{
        borderLeft: annotationBorder ? `2px solid ${annotationBorder}` : undefined,
        marginLeft: annotationBorder ? -2 : undefined,
      }}>
        <div
          style={{ paddingLeft: indent, display: 'flex', alignItems: 'center', minHeight: 20, cursor: 'pointer' }}
          onClick={() => setCollapsed(!collapsed)}
        >
          <LineNum num={currentLine} />
          <span style={{ color: '#6b7280', marginRight: 4, fontSize: 10, width: 12, textAlign: 'center' }}>
            {collapsed ? '▶' : '▼'}
          </span>
          {keyName !== undefined && (
            <><span style={{ color: SYNTAX.key }}>"{keyName}"</span><span style={{ color: SYNTAX.colon }}>: </span></>
          )}
          <span style={{ color: SYNTAX.brace }}>{'{'}</span>
          {collapsed && <span style={{ color: '#6b7280' }}> {keys.length} keys </span>}
          {collapsed && <span style={{ color: SYNTAX.brace }}>{'}'}</span>}
          {annotationLabel && (
            <span style={{
              marginLeft: 8, fontSize: 10, color: annotationBorder || '#9ca3af',
              background: `${annotationBorder || '#9ca3af'}15`, padding: '1px 6px', borderRadius: 3,
            }}>
              {annotationLabel}
            </span>
          )}
        </div>
        {!collapsed && (
          <>
            {keys.map((k) => (
              <JsonNode
                key={k}
                keyName={k}
                value={value[k]}
                depth={depth + 1}
                annotations={annotations}
                lineCounter={lineCounter}
                isNewInDiff={false}
              />
            ))}
            <div style={{ paddingLeft: indent, display: 'flex', alignItems: 'center', minHeight: 20 }}>
              <LineNum num={++lineCounter.current} />
              <span style={{ color: SYNTAX.brace }}>{'}'}</span>
            </div>
          </>
        )}
      </div>
    );
  }

  return null;
}

function PayloadInspector({ message, previousApiRequest }) {
  const [copied, setCopied] = useState(false);
  const lineCounter = useRef(0);

  const payload = message ? (message.payload || message) : null;

  const handleCopy = useCallback(() => {
    if (!payload) return;
    navigator.clipboard.writeText(JSON.stringify(payload, null, 2)).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    });
  }, [payload]);

  if (!message) {
    return (
      <div style={{
        background: PANEL_BG,
        border: `1px solid ${PANEL_BORDER}`,
        borderRadius: 6,
        padding: 16,
        fontFamily: MONO_FONT,
        fontSize: 12,
        color: '#6b7280',
        minHeight: 120,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
      }}>
        Select a message to inspect its payload
      </div>
    );
  }

  // Build annotation map for special fields
  const annotations = {
    tool_use: { borderColor: '#f59e0b', label: 'Model requesting tool call' },
    tool_result: { borderColor: '#10b981', label: 'Injected by host' },
    tools: { borderColor: '#3b82f6', label: 'Discovered from MCP servers during boot' },
    content: null, // we'll annotate content items individually below
  };

  // Check if this is an API request with messages array — detect new messages for diff
  const isDiffMode = previousApiRequest && payload.messages && previousApiRequest.messages;
  const prevMessageCount = isDiffMode ? previousApiRequest.messages.length : 0;

  lineCounter.current = 0;

  return (
    <div style={{
      background: PANEL_BG,
      border: `1px solid ${PANEL_BORDER}`,
      borderRadius: 6,
      overflow: 'hidden',
      fontFamily: MONO_FONT,
      fontSize: 12,
      position: 'relative',
    }}>
      {/* Header */}
      <div style={{
        padding: '8px 12px',
        borderBottom: `1px solid ${PANEL_BORDER}`,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
        background: 'rgba(42,42,74,0.3)',
      }}>
        <span style={{ color: '#d1d5db', fontSize: 11, fontWeight: 600, letterSpacing: 0.5 }}>
          PAYLOAD INSPECTOR
        </span>
        <button
          onClick={handleCopy}
          style={{
            background: copied ? 'rgba(52,211,153,0.2)' : 'rgba(96,165,250,0.1)',
            border: `1px solid ${copied ? '#34d399' : '#3b82f6'}`,
            borderRadius: 4,
            color: copied ? '#34d399' : '#60a5fa',
            fontSize: 10,
            padding: '3px 8px',
            cursor: 'pointer',
            fontFamily: MONO_FONT,
            transition: 'all 0.2s',
          }}
        >
          {copied ? '✓ Copied' : 'Copy'}
        </button>
      </div>

      {/* JSON content */}
      <div style={{
        padding: '8px 4px',
        maxHeight: 360,
        overflowY: 'auto',
        overflowX: 'hidden',
        lineHeight: 1.5,
      }}>
        {/* Diff badge for API Request #2+ */}
        {isDiffMode && (
          <div style={{
            margin: '0 8px 8px 8px',
            padding: '4px 8px',
            background: 'rgba(52,211,153,0.1)',
            border: '1px solid rgba(52,211,153,0.3)',
            borderRadius: 4,
            fontSize: 11,
            color: '#34d399',
          }}>
            Diff view: {payload.messages.length - prevMessageCount} new message{payload.messages.length - prevMessageCount !== 1 ? 's' : ''} since previous request
          </div>
        )}

        {/* Render JSON with special handling for messages array diff */}
        {isDiffMode ? (
          <DiffJsonView
            payload={payload}
            prevMessageCount={prevMessageCount}

          />
        ) : (
          <JsonNode
            value={payload}

            lineCounter={lineCounter}
          />

  );

// ============================================================================
// DIFF JSON VIEW — highlights new messages in the messages array
// ============================================================================

function DiffJsonView({ payload, prevMessageCount, annotations }) {
  const lineCounter = useRef(0);

  // Render the object keys manually so we can special-case "messages"
  const keys = Object.keys(payload);

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', minHeight: 20 }}>
        <span style={{ color: '#4a4a6a', marginRight: 8, minWidth: 28, display: 'inline-block', textAlign: 'right', fontSize: 11 }}>
          {++lineCounter.current}
        </span>
        <span style={{ color: SYNTAX.brace }}>{'{'}</span>
      </div>
      {keys.map((k) => {
        if (k === 'messages' && Array.isArray(payload[k])) {
          return (
            <DiffMessagesArray
              key={k}
              messages={payload[k]}
              prevMessageCount={prevMessageCount}
              lineCounter={lineCounter}
              annotations={annotations}
            />
          );
        }
        return (
          <JsonNode
            key={k}
            keyName={k}
            value={payload[k]}
            depth={1}
            annotations={annotations}
            lineCounter={lineCounter}
          />
        );
      })}
      <div style={{ display: 'flex', alignItems: 'center', minHeight: 20 }}>
        <span style={{ color: '#4a4a6a', marginRight: 8, minWidth: 28, display: 'inline-block', textAlign: 'right', fontSize: 11 }}>
          {++lineCounter.current}
        </span>
        <span style={{ color: SYNTAX.brace }}>{'}'}</span>
      </div>
    </div>
  );
}

function DiffMessagesArray({ messages, prevMessageCount, lineCounter, annotations }) {
  const [collapsed, setCollapsed] = useState(false);
  const currentLine = ++lineCounter.current;

  return (
    <div>
      <div
        style={{ paddingLeft: 16, display: 'flex', alignItems: 'center', minHeight: 20, cursor: 'pointer' }}
        onClick={() => setCollapsed(!collapsed)}
      >
        <span style={{ color: '#4a4a6a', marginRight: 8, minWidth: 28, display: 'inline-block', textAlign: 'right', fontSize: 11 }}>
          {currentLine}
        </span>
        <span style={{ color: '#6b7280', marginRight: 4, fontSize: 10, width: 12, textAlign: 'center' }}>
          {collapsed ? '▶' : '▼'}
        </span>
        <span style={{ color: SYNTAX.key }}>"messages"</span>
        <span style={{ color: SYNTAX.colon }}>: </span>
        <span style={{ color: SYNTAX.brace }}>[</span>
        {collapsed && <span style={{ color: '#6b7280' }}> {messages.length} items </span>}
        {collapsed && <span style={{ color: SYNTAX.brace }}>]</span>}
      </div>
      {!collapsed && (
        <>
          {messages.map((msg, i) => {
            const isNew = i >= prevMessageCount;
            const msgAnnotation = getMsgAnnotation(msg);
            return (
              <div
                key={i}
                style={{
                  borderLeft: isNew ? '3px solid #34d399' : msgAnnotation ? `2px solid ${msgAnnotation.borderColor}` : undefined,
                  marginLeft: isNew ? -1 : undefined,
                  background: isNew ? 'rgba(52,211,153,0.06)' : undefined,
                  position: 'relative',
                }}
              >
                {isNew && (
                  <span style={{
                    position: 'absolute',
                    right: 8,
                    top: 2,
                    fontSize: 9,
                    fontWeight: 700,
                    color: '#34d399',
                    background: 'rgba(52,211,153,0.15)',
                    padding: '1px 5px',
                    borderRadius: 3,
                    letterSpacing: 0.5,
                  }}>
                    +NEW
                  </span>
                )}
                {msgAnnotation && (
                  <span style={{
                    position: 'absolute',
                    right: isNew ? 52 : 8,
                    top: 2,
                    fontSize: 9,
                    color: msgAnnotation.borderColor,
                    background: `${msgAnnotation.borderColor}15`,
                    padding: '1px 5px',
                    borderRadius: 3,
                  }}>
                    {msgAnnotation.label}
                  </span>
                )}
                <JsonNode
                  value={msg}
                  depth={2}
                  annotations={annotations}
                  lineCounter={lineCounter}
                />
              </div>
            );
          })}
          <div style={{ paddingLeft: 16, display: 'flex', alignItems: 'center', minHeight: 20 }}>
            <span style={{ color: '#4a4a6a', marginRight: 8, minWidth: 28, display: 'inline-block', textAlign: 'right', fontSize: 11 }}>
              {++lineCounter.current}
            </span>
            <span style={{ color: SYNTAX.brace }}>]</span>
          </div>
        </>
      )}
    </div>
  );
}

function getMsgAnnotation(msg) {
  if (!msg) return null;
  if (msg.role === 'user' && Array.isArray(msg.content)) {
    const hasToolResult = msg.content.some(c => c.type === 'tool_result');
    if (hasToolResult) return { borderColor: '#10b981', label: 'Tool result (injected)' };
  }
  if (msg.role === 'user' && typeof msg.content === 'string') {
    return { borderColor: '#9ca3af', label: 'User message' };
  }
  if (msg.role === 'assistant' && Array.isArray(msg.content)) {
    const hasToolUse = msg.content.some(c => c.type === 'tool_use');
    if (hasToolUse) return { borderColor: '#f59e0b', label: 'Assistant (tool_use)' };
    return { borderColor: '#c084fc', label: 'Assistant response' };
  }
  if (msg.role === 'assistant' && typeof msg.content === 'string') {
    return { borderColor: '#c084fc', label: 'Assistant response' };
  }
  return null;
}

// ============================================================================
// MESSAGE LOG
// ============================================================================

function MessageLog({ messageLog, currentStepIndex, onSelectMessage }) {
  const [selectedIdx, setSelectedIdx] = useState(null);
  const scrollRef = useRef(null);
  const currentRef = useRef(null);

  // Find which log entry corresponds to the current step
  const currentLogIdx = useMemo(() => {
    if (!messageLog || messageLog.length === 0) return -1;
    // Find the latest log entry whose timestamp <= currentStepIndex
    let latest = -1;
    for (let i = 0; i < messageLog.length; i++) {
      if (messageLog[i].timestamp <= currentStepIndex) latest = i;
    }
    return latest;
  }, [messageLog, currentStepIndex]);

  // Auto-scroll to current message
  useEffect(() => {
    if (currentRef.current) {
      currentRef.current.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }, [currentLogIdx]);

  const handleSelect = useCallback((idx) => {
    setSelectedIdx(idx);
    if (onSelectMessage && messageLog[idx]) {
      onSelectMessage(messageLog[idx]);
    }
  }, [onSelectMessage, messageLog]);

  if (!messageLog || messageLog.length === 0) {
    return (
      <div style={{
        background: PANEL_BG,
        border: `1px solid ${PANEL_BORDER}`,
        borderRadius: 6,
        padding: 16,
        fontFamily: MONO_FONT,
        fontSize: 12,
        color: '#6b7280',
        minHeight: 80,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
      }}>
        No messages yet — step forward to see the flow
      </div>
    );
  }

  return (
    <div style={{
      background: PANEL_BG,
      border: `1px solid ${PANEL_BORDER}`,
      borderRadius: 6,
      overflow: 'hidden',
      fontFamily: MONO_FONT,
      fontSize: 12,
    }}>
      {/* Header */}
      <div style={{
        padding: '8px 12px',
        borderBottom: `1px solid ${PANEL_BORDER}`,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
        background: 'rgba(42,42,74,0.3)',
      }}>
        <span style={{ color: '#d1d5db', fontSize: 11, fontWeight: 600, letterSpacing: 0.5 }}>
          MESSAGE LOG
        </span>
        <span style={{ color: '#6b7280', fontSize: 10 }}>
          {messageLog.length} message{messageLog.length !== 1 ? 's' : ''}
        </span>
      </div>

      {/* Scrolling log */}
      <div
        ref={scrollRef}
        style={{
          maxHeight: 240,
          overflowY: 'auto',
          overflowX: 'hidden',
        }}
      >
        {messageLog.map((entry, idx) => {
          const info = getMessageDisplayInfo(entry);
          const isCurrent = idx === currentLogIdx;
          const isSelected = idx === selectedIdx;

          return (
            <div
              key={entry.stepId + '-' + idx}
              ref={isCurrent ? currentRef : null}
              onClick={() => handleSelect(idx)}
              style={{
                padding: '6px 12px',
                borderLeft: `3px solid ${info.color}`,
                background: isCurrent ? CURRENT_BG : isSelected ? HIGHLIGHT_BG : 'transparent',
                cursor: 'pointer',
                borderBottom: `1px solid ${PANEL_BORDER}`,
                transition: 'background 0.2s',
                display: 'flex',
                alignItems: 'center',
                gap: 8,
              }}
              onMouseEnter={(e) => {
                if (!isCurrent && !isSelected) e.currentTarget.style.background = 'rgba(96,165,250,0.05)';
              }}
              onMouseLeave={(e) => {
                if (!isCurrent && !isSelected) e.currentTarget.style.background = 'transparent';
              }}
            >
              {/* Direction arrow */}
              <span style={{
                color: info.color,
                fontSize: 14,
                fontWeight: 700,
                flexShrink: 0,
                width: 16,
                textAlign: 'center',
              }}>
                {info.arrow}
              </span>

              {/* Label & summary */}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{
                  color: info.color,
                  fontWeight: 600,
                  fontSize: 11,
                  whiteSpace: 'nowrap',
                  overflow: 'hidden',
                  textOverflow: 'ellipsis',
                }}>
                  {info.label}
                </div>
                <div style={{
                  color: '#6b7280',
                  fontSize: 10,
                  whiteSpace: 'nowrap',
                  overflow: 'hidden',
                  textOverflow: 'ellipsis',
                }}>
                  {info.summary}
                </div>
              </div>

              {/* Act badge */}
              <span style={{
                fontSize: 9,
                color: '#9ca3af',
                background: 'rgba(156,163,175,0.1)',
                padding: '1px 5px',
                borderRadius: 3,
                flexShrink: 0,
              }}>
                Act {entry.act}
              </span>

              {/* Current indicator */}
              {isCurrent && (
                <span style={{
                  width: 6,
                  height: 6,
                  borderRadius: '50%',
                  background: '#60a5fa',
                  boxShadow: '0 0 6px rgba(96,165,250,0.6)',
                  flexShrink: 0,
                }} />
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

                  key={key}
                  servers={config[key]}

                  lineCounter={lineCounter}

            return (
              <JsonNode
                key={key}
                keyName={key}
                value={config[key]}
                depth={1}
                annotations={configAnnotations}
                lineCounter={lineCounter}
              />

          })}

          <div style={{ display: 'flex', alignItems: 'center', minHeight: 20 }}>
            <span style={{ color: '#4a4a6a', marginRight: 8, minWidth: 28, display: 'inline-block', textAlign: 'right', fontSize: 11 }}>
              {++lineCounter.current}
            </span>
            <span style={{ color: SYNTAX.brace }}>{'}'}</span>
          </div>
        </div>

}

function ConfigServersSection({ servers, annotation, lineCounter }) {
  const [collapsed, setCollapsed] = useState(false);
  const currentLine = ++lineCounter.current;
  const serverKeys = Object.keys(servers);

  return (
    <div style={{
      borderLeft: annotation ? `2px solid ${annotation.borderColor}` : undefined,
      marginLeft: annotation ? -2 : undefined,
    }}>
      <div
        style={{ paddingLeft: 16, display: 'flex', alignItems: 'center', minHeight: 20, cursor: 'pointer' }}
        onClick={() => setCollapsed(!collapsed)}
      >
        <span style={{ color: '#4a4a6a', marginRight: 8, minWidth: 28, display: 'inline-block', textAlign: 'right', fontSize: 11 }}>
          {currentLine}
        </span>
        <span style={{ color: '#6b7280', marginRight: 4, fontSize: 10, width: 12, textAlign: 'center' }}>
          {collapsed ? '▶' : '▼'}
        </span>
        <span style={{ color: SYNTAX.key }}>"mcpServers"</span>
        <span style={{ color: SYNTAX.colon }}>: </span>
        <span style={{ color: SYNTAX.brace }}>{'{'}</span>
        {collapsed && <span style={{ color: '#6b7280' }}> {serverKeys.length} servers </span>}
        {collapsed && <span style={{ color: SYNTAX.brace }}>{'}'}</span>}
        {annotation && (
          <span style={{
            marginLeft: 8, fontSize: 10, color: annotation.borderColor,
            background: `${annotation.borderColor}15`, padding: '1px 6px', borderRadius: 3,
          }}>
            {annotation.label}
          </span>
        )}
      </div>

      {!collapsed && (
        <>
          {serverKeys.map((serverName) => {
            const server = servers[serverName];
            const transport = server.transport || 'stdio';
            return (
              <div key={serverName} style={{ position: 'relative' }}>
                <span style={{
                  position: 'absolute',
                  right: 8,
                  top: 2,
                  fontSize: 9,
                  color: COLORS.transport.text,
                  background: 'rgba(107,114,128,0.15)',
                  padding: '1px 5px',
                  borderRadius: 3,
                }}>
                  transport: {transport}
                </span>
                <JsonNode
                  keyName={serverName}
                  value={server}
                  depth={2}
                  annotations={{}}
                  lineCounter={lineCounter}
                />
              </div>
            );
          })}
          <div style={{ paddingLeft: 16, display: 'flex', alignItems: 'center', minHeight: 20 }}>
            <span style={{ color: '#4a4a6a', marginRight: 8, minWidth: 28, display: 'inline-block', textAlign: 'right', fontSize: 11 }}>
              {++lineCounter.current}
            </span>
            <span style={{ color: SYNTAX.brace }}>{'}'}</span>
          </div>
        </>
      )}
    </div>
  );
}

function ChatPanel({ conversationHistory, currentStep, isWaitingForApi }) {
  const scrollRef = useRef(null);
  const [expandedTools, setExpandedTools] = useState({});

  // Auto-scroll to bottom when new messages arrive
  useEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  }, [conversationHistory]);

  const toggleToolExpand = (id) => {
    setExpandedTools(prev => ({ ...prev, [id]: !prev[id] }));
  };

  const hasMessages = conversationHistory && conversationHistory.length > 0;

  return (
    <div style={{
      display: 'flex',
      flexDirection: 'column',
      height: '100%',
      background: '#11111b',
      borderRadius: 12,
      overflow: 'hidden',
      fontFamily: FONT.sans,
    }}>
      {/* Header */}
      <div style={{
        padding: '12px 16px',
        borderBottom: '1px solid #2a2a3c',
        display: 'flex',
        alignItems: 'center',
        gap: 10,
        flexShrink: 0,
      }}>
        <div style={{
          width: 8, height: 8,
          borderRadius: '50%',
          background: hasMessages ? '#10b981' : '#6b7280',
          boxShadow: hasMessages ? '0 0 6px rgba(16,185,129,0.5)' : 'none',
        }} />
        <span style={{ color: '#e2e8f0', fontSize: 14, fontWeight: 600 }}>
          Chat
        </span>
        {currentStep && currentStep.act > 1 && (
          <span style={{ color: '#6b7280', fontSize: 12, marginLeft: 'auto' }}>
            Act {currentStep.act}
          </span>
        )}
      </div>

      {/* Message area */}
      <div
        ref={scrollRef}
        style={{
          flex: 1,
          overflowY: 'auto',
          padding: '16px',
          display: 'flex',
          flexDirection: 'column',
          gap: 12,
        }}
      >
        {!hasMessages && (
          <div style={{
            flex: 1,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            flexDirection: 'column',
            gap: 8,
          }}>
            <span style={{ fontSize: 32, opacity: 0.3 }}>💬</span>
            <span style={{ color: '#6b7280', fontSize: 14, textAlign: 'center' }}>
              Start a conversation to begin...
            </span>
          </div>
        )}

        {hasMessages && conversationHistory.map((msg, i) => (
          <ChatMessage
            key={msg.stepId + '-' + i}
            message={msg}
            expanded={expandedTools[msg.toolUseId]}
            onToggleTool={() => msg.toolUseId && toggleToolExpand(msg.toolUseId)}
          />
        ))}

        {/* Typing indicator */}
        {isWaitingForApi && (
          <div style={{
            display: 'flex',
            alignItems: 'flex-start',
            gap: 8,
          }}>
            <div style={{
              width: 28, height: 28, borderRadius: '50%',
              background: 'linear-gradient(135deg, #c084fc, #a855f7)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 14, flexShrink: 0,
            }}>
              ✦
            </div>
            <div style={{
              background: '#1e1e2e',
              borderRadius: '12px 12px 12px 4px',
              padding: '12px 16px',
              display: 'flex',
              gap: 4,
              alignItems: 'center',
            }}>
              <TypingDot delay={0} />
              <TypingDot delay={150} />
              <TypingDot delay={300} />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// --- Chat sub-components ---

function TypingDot({ delay }) {
  return (
    <span style={{
      width: 7,
      height: 7,
      borderRadius: '50%',
      background: '#a855f7',
      display: 'inline-block',
      animation: `typingBounce 1.2s ease-in-out ${delay}ms infinite`,
    }}>
      <style>{`
        @keyframes typingBounce {
          0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
          30% { transform: translateY(-6px); opacity: 1; }
        }
      `}</style>
    </span>
  );
}

function ChatMessage({ message, expanded, onToggleTool }) {
  const isUser = message.role === 'user';
  const isToolUse = message.type === 'tool_use';

  return (
    <div style={{
      display: 'flex',
      flexDirection: 'column',
      alignItems: isUser ? 'flex-end' : 'flex-start',
    }}>
      <div style={{
        display: 'flex',
        alignItems: 'flex-start',
        gap: 8,
        maxWidth: '88%',
        flexDirection: isUser ? 'row-reverse' : 'row',
      }}>
        {/* Avatar */}
        {!isUser && (
          <div style={{
            width: 28, height: 28, borderRadius: '50%',
            background: 'linear-gradient(135deg, #c084fc, #a855f7)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 14, flexShrink: 0, color: '#fff',
          }}>
            ✦
          </div>
        )}

        {/* Bubble */}
        <div style={{
          background: isUser ? '#2d2b55' : '#1e1e2e',
          borderRadius: isUser ? '12px 12px 4px 12px' : '12px 12px 12px 4px',
          padding: isToolUse ? '0' : '10px 14px',
          border: isToolUse ? '1px solid #4a3728' : '1px solid transparent',
          overflow: 'hidden',
        }}>
          {isToolUse ? (
            <ToolCallBubble
              tool={message.tool}
              args={message.args}
              expanded={expanded}
              onToggle={onToggleTool}
            />
          ) : (
            <div style={{
              color: '#e2e8f0',
              fontSize: 14,
              lineHeight: 1.55,
              whiteSpace: 'pre-wrap',
              wordBreak: 'break-word',
            }}>
              {message.content}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function ToolCallBubble({ tool, args, expanded, onToggle }) {
  const argsStr = args
    ? Object.entries(args).map(([k, v]) => {
        const val = typeof v === 'string'
          ? (v.length > 40 ? v.slice(0, 37) + '...' : v)
          : JSON.stringify(v);
        return `${k}: ${val}`;
      }).join(', ')
    : '';

  return (
    <div>
      {/* Collapsed pill */}
      <button
        onClick={onToggle}
        style={{
          display: 'flex',
          alignItems: 'center',
          gap: 8,
          padding: '8px 12px',
          width: '100%',
          border: 'none',
          background: 'transparent',
          cursor: 'pointer',
          textAlign: 'left',
          fontFamily: FONT.sans,
        }}
      >
        <span style={{ fontSize: 14 }}>🔧</span>
        <span style={{
          color: '#fbbf24',
          fontSize: 13,
          fontWeight: 600,
        }}>
          Used tool: {tool}
        </span>
        <span style={{
          color: '#6b7280',
          fontSize: 12,
          fontFamily: FONT.mono,
          overflow: 'hidden',
          textOverflow: 'ellipsis',
          whiteSpace: 'nowrap',
          flex: 1,
        }}>
          ({argsStr})
        </span>
        <span style={{
          color: '#6b7280',
          fontSize: 10,
          transform: expanded ? 'rotate(180deg)' : 'rotate(0deg)',
          transition: 'transform 0.2s ease',
        }}>
          ▼
        </span>
      </button>

      {/* Expanded args */}
      {expanded && args && (
        <div style={{
          padding: '0 12px 10px 12px',
          borderTop: '1px solid #2a2a3c',
        }}>
          <pre style={{
            margin: '8px 0 0 0',
            padding: 8,
            background: '#13131d',
            borderRadius: 6,
            fontSize: 12,
            fontFamily: FONT.mono,
            color: '#c084fc',
            overflowX: 'auto',
            whiteSpace: 'pre-wrap',
            wordBreak: 'break-word',
          }}>
            {JSON.stringify(args, null, 2)}
          </pre>
        </div>
      )}
    </div>
  );
}

// 2. StepNarrator
// ============================================================================

function StepNarrator({
  currentStep,
  stepIndex,
  totalSteps,
  currentAct,
  onNext,
  onPrev,
  onPlay,
  onPause,
  isPlaying,
  playSpeed,
  onSetSpeed,
  onGoToAct,
}) {
  const phase = currentStep ? currentStep.phase : 'boot';
  const phaseInfo = PHASE_COLORS[phase] || PHASE_COLORS.boot;
  const narration = currentStep ? currentStep.narration : '';
  const stepLabel = currentStep ? currentStep.label : '';

  // Compute act-local step index
  const actMeta = ACT_METADATA[currentAct];

  // Speed presets in ms
  const speedPresets = [
    { label: '0.5x', value: 4000 },
    { label: '1x',   value: 2000 },
    { label: '2x',   value: 1000 },
  ];

  return (
    <div style={{
      display: 'flex',
      flexDirection: 'column',
      gap: 0,
      background: '#11111b',
      borderRadius: 12,
      overflow: 'hidden',
      fontFamily: FONT.sans,
    }}>
      {/* Act Tabs */}
      <div style={{
        display: 'flex',
        gap: 0,
        borderBottom: '1px solid #2a2a3c',
      }}>
        {[1, 2, 3, 4].map(act => {
          const meta = ACT_METADATA[act];
          const isActive = currentAct === act;
          return (
            <button
              key={act}
              onClick={() => onGoToAct(act)}
              style={{
                flex: 1,
                padding: '10px 8px',
                border: 'none',
                borderBottom: isActive ? '2px solid #fbbf24' : '2px solid transparent',
                background: isActive ? 'rgba(251,191,36,0.08)' : 'transparent',
                color: isActive ? '#fbbf24' : '#6b7280',
                fontSize: 12,
                fontWeight: isActive ? 700 : 500,
                cursor: 'pointer',
                fontFamily: FONT.sans,
                transition: 'all 0.2s ease',
                whiteSpace: 'nowrap',
                overflow: 'hidden',
                textOverflow: 'ellipsis',
              }}
              title={meta ? meta.title : ''}
            >
              Act {act}{meta ? ': ' + meta.subtitle : ''}
            </button>
          );
        })}
      </div>

      {/* Step Header: Phase badge + step counter */}
      <div style={{
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
        padding: '10px 16px',
        gap: 12,
      }}>
        {/* Phase badge */}
        <span style={{
          display: 'inline-flex',
          alignItems: 'center',
          padding: '3px 10px',
          borderRadius: 999,
          background: phaseInfo.bg,
          color: phaseInfo.text,
          fontSize: 11,
          fontWeight: 700,
          letterSpacing: '0.05em',
          textTransform: 'uppercase',
          border: `1px solid ${phaseInfo.text}33`,
          whiteSpace: 'nowrap',
        }}>
          {phaseInfo.label}
        </span>

        {/* Step label */}
        <span style={{
          color: '#e2e8f0',
          fontSize: 13,
          fontWeight: 600,
          flex: 1,
          textAlign: 'center',
          overflow: 'hidden',
          textOverflow: 'ellipsis',
          whiteSpace: 'nowrap',
        }}>
          {stepLabel}
        </span>

        {/* Step counter */}
        <span style={{
          color: '#6b7280',
          fontSize: 12,
          fontFamily: FONT.mono,
          whiteSpace: 'nowrap',
        }}>
          Step {stepIndex + 1} of {totalSteps}
        </span>
      </div>

      {/* Narration text */}
      <div style={{
        padding: '4px 20px 16px 20px',
        minHeight: 80,
      }}>
        <p style={{
          color: '#e2e8f0',
          fontSize: 16,
          lineHeight: 1.65,
          margin: 0,
          fontWeight: 400,
        }}>
          {highlightNarration(narration)}

      <div style={{
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
        padding: '10px 16px',
        borderTop: '1px solid #2a2a3c',
        gap: 8,
        flexWrap: 'wrap',
      }}>
        {/* Nav buttons */}
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          <NavButton onClick={onPrev} disabled={stepIndex <= 0} title="Previous step (←)">

          </NavButton>
          <NavButton onClick={onNext} disabled={stepIndex >= totalSteps - 1} title="Next step (→)">
            Next ▶
          </NavButton>
          <NavButton
            onClick={isPlaying ? onPause : onPlay}

/**
 * Highlight key phrases in narration text.
 * Wraps text in single quotes and UPPERCASE phrases in styled spans.
 */
function highlightNarration(text) {
  if (!text) return null;

  // Split on quoted segments and specific emphasis words
  const parts = [];
  let remaining = text;
  // Match: 'quoted text', ALLCAPS words (3+ chars), bold markers **text**
  const pattern = /('([^']+)'|(?<!\w)(HOST|NOT|ALWAYS|SECOND|ANOTHER|TWO|THREE|SAME|DIFFERENT|NO|NEVER|NEW|ALL|WHO|WHAT)(?!\w)|\*\*([^*]+)\*\*)/g;
  let match;
  let lastIndex = 0;

  while ((match = pattern.exec(remaining)) !== null) {
    // Text before the match
    if (match.index > lastIndex) {
      parts.push(remaining.slice(lastIndex, match.index));
    }

    if (match[2]) {
      // Quoted text → monospace amber
      parts.push(
        <span key={match.index} style={{
          color: '#fbbf24',
          fontFamily: FONT.mono,
          fontSize: '0.92em',
          background: 'rgba(251,191,36,0.08)',
          padding: '1px 4px',
          borderRadius: 3,
        }}>
          {match[2]}
        </span>
      );
    } else if (match[3]) {
      // UPPERCASE emphasis → bold amber
      parts.push(
        <span key={match.index} style={{
          color: '#fbbf24',
          fontWeight: 700,
        }}>
          {match[3]}
        </span>
      );
    } else if (match[4]) {
      // **bold** text
      parts.push(
        <strong key={match.index} style={{ color: '#fbbf24' }}>
          {match[4]}
        </strong>
      );
    }

    lastIndex = match.index + match[0].length;
  }

  if (lastIndex < remaining.length) {
    parts.push(remaining.slice(lastIndex));
  }

  return parts.length > 0 ? parts : text;
}

function ActTransition({ act, onDismiss }) {
  const [visible, setVisible] = useState(false);
  const [exiting, setExiting] = useState(false);
  const timerRef = useRef(null);

  const meta = ACT_METADATA[act];

  useEffect(() => {
    // Fade in
    const fadeInTimer = setTimeout(() => setVisible(true), 30);

    // Auto-dismiss after 3 seconds
    timerRef.current = setTimeout(() => {
      handleDismiss();
    }, 3000);

    return () => {
      clearTimeout(fadeInTimer);
      if (timerRef.current) clearTimeout(timerRef.current);
    };
  }, [act]);

  const handleDismiss = () => {
    setExiting(true);
    setTimeout(() => {
      if (onDismiss) onDismiss();
    }, 300);
  };

  const handleClick = () => {
    if (timerRef.current) clearTimeout(timerRef.current);
    handleDismiss();
  };

  if (!meta) return null;

  // Act-specific accent colors
  const actColors = {
    1: { accent: '#f59e0b', bg: 'rgba(245,158,11,0.08)', border: 'rgba(245,158,11,0.2)' },
    2: { accent: '#a855f7', bg: 'rgba(168,85,247,0.08)', border: 'rgba(168,85,247,0.2)' },
    3: { accent: '#10b981', bg: 'rgba(16,185,129,0.08)', border: 'rgba(16,185,129,0.2)' },
    4: { accent: '#3b82f6', bg: 'rgba(59,130,246,0.08)', border: 'rgba(59,130,246,0.2)' },
  };
  const colors = actColors[act] || actColors[1];

  return (
    <div
      onClick={handleClick}
      style={{
        position: 'fixed',
        inset: 0,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        background: 'rgba(0,0,0,0.7)',
        backdropFilter: 'blur(8px)',
        zIndex: 9999,
        opacity: visible && !exiting ? 1 : 0,
        transition: 'opacity 0.3s ease',
        cursor: 'pointer',
        fontFamily: FONT.sans,
      }}
    >
      <div style={{
        maxWidth: 520,
        width: '90%',
        background: '#1a1a2e',
        border: `1px solid ${colors.border}`,
        borderRadius: 16,
        padding: '36px 40px',
        textAlign: 'center',
        transform: visible && !exiting ? 'scale(1) translateY(0)' : 'scale(0.95) translateY(8px)',
        transition: 'transform 0.3s ease',
      }}>
        {/* Act number */}
        <div style={{
          fontSize: 13,
          fontWeight: 700,
          color: colors.accent,
          textTransform: 'uppercase',
          letterSpacing: '0.12em',
          marginBottom: 6,
        }}>
          Act {meta.number}
        </div>

        {/* Title */}

function App() {
  const [started, setStarted] = useState(false);
  const [showActTransition, setShowActTransition] = useState(null);
  const [configExpanded, setConfigExpanded] = useState(false);
  const [selectedLogEntry, setSelectedLogEntry] = useState(null);
  const [isWide, setIsWide] = useState(
    typeof window !== 'undefined' ? window.innerWidth >= 1024 : true
  );
  const prevActRef = useRef(null);

  const sim = useSimulation();

  // Responsive resize handler
  useEffect(() => {
    const handler = () => setIsWide(window.innerWidth >= 1024);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);

  // Detect act changes for transition overlays
  useEffect(() => {
    if (started && prevActRef.current !== null && prevActRef.current !== sim.currentAct) {
      setShowActTransition(sim.currentAct);
    }
    prevActRef.current = sim.currentAct;
  }, [sim.currentAct, started]);

  // Reset selected log entry on step change
  useEffect(() => {
    setSelectedLogEntry(null);
  }, [sim.currentStepIndex]);

  // Keyboard shortcuts
  useEffect(() => {
    if (!started) return;
    const handler = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      switch (e.key) {
        case 'ArrowRight':
        case ' ':
          e.preventDefault();
          sim.next();
          break;
        case 'ArrowLeft':
          e.preventDefault();
          sim.prev();
          break;
        case '1': case '2': case '3': case '4':
          e.preventDefault();
          sim.goToAct(parseInt(e.key));
          break;
        case 'p': case 'P':
          e.preventDefault();
          sim.togglePlay();
          break;
        case 'Escape':
          e.preventDefault();
          sim.reset();
          break;
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [started, sim.next, sim.prev, sim.goToAct, sim.togglePlay, sim.reset]);

  // Compute inspector payload
  const inspectorPayload = useMemo(() => {
    if (selectedLogEntry) return selectedLogEntry.payload;
    return sim.currentStep.message || null;
  }, [selectedLogEntry, sim.currentStep]);

  // Compute previous API request for diff view
  const previousApiRequest = useMemo(() => {
    if (!inspectorPayload || !inspectorPayload.messages) return null;
    const targetStepId = selectedLogEntry ? selectedLogEntry.stepId : sim.currentStep.id;
    const idx = sim.messageLog.findIndex(m => m.stepId === targetStepId);
    for (let i = (idx >= 0 ? idx : sim.messageLog.length) - 1; i >= 0; i--) {
      const entry = sim.messageLog[i];
      if (entry.payload && entry.payload.messages && entry.stepId !== targetStepId) {
        return entry.payload;
      }
    }
    return null;
  }, [inspectorPayload, sim.messageLog, selectedLogEntry, sim.currentStep]);

  const isWaitingForApi = sim.state.hostState === 'waiting_for_api';

  // Start handlers
  const handleStart = useCallback(() => {
    setStarted(true);
    sim.goToStep(0);
    setShowActTransition(1);
    prevActRef.current = 1;
  }, [sim]);

  const handleSkipToAct = useCallback((act) => {
    setStarted(true);
    sim.goToAct(act);
    prevActRef.current = act;
  }, [sim]);

  // Landing screen
  if (!started) {
    return <LandingScreen onStart={handleStart} onSkipToAct={handleSkipToAct} />;
  }

  // Main demo layout
  return (
    <SimulationContext.Provider value={sim}>
      <div style={{
        display: 'flex',
        flexDirection: 'column',
        height: '100vh',
        background: '#0f0f1a',
        fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif",
      }}>
        {/* Header */}
        <HeaderBar
          currentAct={sim.currentAct}
          onGoToAct={sim.goToAct}
          currentStepIndex={sim.currentStepIndex}
          totalSteps={sim.totalSteps}
        />

        {/* Main content area */}
        {isWide ? (
          /* === WIDE LAYOUT (>= 1024px) === */
          <div style={{ display: 'flex', flex: 1, minHeight: 0, overflow: 'hidden' }}>
            {/* Left: Chat Panel */}
            <div style={{
              width: '38%',
              padding: '8px 4px 8px 8px',
              display: 'flex',
              flexDirection: 'column',
              minHeight: 0,
            }}>
              <ChatPanel
                conversationHistory={sim.conversationHistory}
                currentStep={sim.currentStep}
                isWaitingForApi={isWaitingForApi}
              />
            </div>

            {/* Right: Internals */}
            <div style={{
              width: '62%',
              display: 'flex',
              flexDirection: 'column',
              padding: '8px 8px 8px 4px',
              gap: 6,
              minHeight: 0,
            }}>
              {/* Architecture Diagram ~45% */}
              <div style={{

                overflow: 'hidden',
                borderRadius: 12,
              }}>
                <ArchitectureDiagram
                  activeComponents={sim.activeComponents}
                  messageFlow={sim.messageFlow}
                  componentStates={sim.componentStates}

              </div>

              {/* Message Log + Inspector ~30% */}

            </div>
            <ArchitectureDiagram
              activeComponents={sim.activeComponents}
              messageFlow={sim.messageFlow}
              componentStates={sim.componentStates}
              phase={sim.currentStep.phase}
            />
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              <div style={{ flex: '1 1 300px', minWidth: 0 }}>
                <MessageLog
                  messageLog={sim.messageLog}
                  currentStepIndex={sim.currentStepIndex}
                  onSelectMessage={(entry) => setSelectedLogEntry(entry)}
                />
              </div>
              <div style={{ flex: '1 1 300px', minWidth: 0 }}>
                <PayloadInspector
                  message={inspectorPayload}
                  previousApiRequest={previousApiRequest}
                />
              </div>
            </div>
            <StepNarrator
              currentStep={sim.currentStep}
              stepIndex={sim.currentStepIndex}
              totalSteps={sim.totalSteps}
              currentAct={sim.currentAct}
              onNext={sim.next}
              onPrev={sim.prev}
              onPlay={sim.play}
              onPause={sim.pause}
              isPlaying={sim.isPlaying}
              playSpeed={sim.playSpeed}
              onSetSpeed={sim.setPlaySpeed}
              onGoToAct={sim.goToAct}
            />
          </div>
        )}

        {/* Config Viewer (collapsible bottom drawer) */}
        <div style={{ flexShrink: 0, padding: '0 8px 8px' }}>
          <ConfigViewer
            config={sim.config}
            isExpanded={configExpanded}
            onToggle={() => setConfigExpanded(prev => !prev)}
          />
        </div>

        {/* Act Transition Overlay */}
        {showActTransition && (
          <ActTransition
            act={showActTransition}
            onDismiss={() => setShowActTransition(null)}
          />
        )}
      </div>
    </SimulationContext.Provider>
  );
}

// ============================================================================
// RENDER
// ============================================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
